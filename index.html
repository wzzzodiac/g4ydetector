<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Detector</title>
    <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=ZXzNV7cbQB_ycx32piBURhwP6YMZPK8Wg-TzZ56XZ57eRCANKKWANmMcu5PBq5GmgQhLYoLPAJ3m5YXjyanNJh0W7e70-OzG1hFPtn6AXhpBAxFHCrx9bz8jTcEZc-ZEoxTcBQRiC9iON3dsnM8ay0Gl-WkFH--mDLCACDWyoc1aNt3QgDZHJRZoEsGs-ru8g05K84b-dL_IVJ5N03Mt0_7xyA0f3WRTMEJt1wp_9dkkDkhzS9TNl0RVvIj4kGFc" charset="UTF-8"></script><style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 1rem;
        }

        #scanner {
            position: relative;
            width: 300px;
            height: 300px;
            background: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ccc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }

        /* The laser overlay is created dynamically via JavaScript */
        .laser {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 40%, rgba(255,0,0,0.4) 50%, transparent 60%);
            animation: scanning 2s linear forwards;
        }

        @keyframes scanning {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        #detect-btn {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            background-color: #6200ea;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #detect-btn:hover {
            background-color: #4500b5;
        }

        #result {
            margin-top: 1rem;
            font-size: 1.2rem;
            min-height: 1.5em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Fun Detector</h1>
    <div id="scanner"></div>
    <button id="detect-btn">Detectar</button>
    <div id="result"></div>

    <script>
        (function() {
            // Array of responses. Replace these strings with your own fun phrases.
            const responses = [
                'respuesta 1',
                'respuesta 2',
                'respuesta 3',
                'respuesta 4',
                'respuesta 5'
            ];

            const scanner = document.getElementById('scanner');
            const button = document.getElementById('detect-btn');
            const result = document.getElementById('result');

            function startScan() {
                // Remove any existing laser overlay
                const oldLaser = scanner.querySelector('.laser');
                if (oldLaser) {
                    scanner.removeChild(oldLaser);
                }
                // Create a new laser overlay and append it to the scanner
                const laser = document.createElement('div');
                laser.className = 'laser';
                scanner.appendChild(laser);

                // After the animation ends, show a random response
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * responses.length);
                    result.textContent = responses[randomIndex];
                }, 2000); // match the CSS animation duration
            }

            button.addEventListener('click', startScan);
        })();
    </script>
</body>
</html>
