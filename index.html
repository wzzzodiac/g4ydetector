<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Detector</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 15% 20%, #ffd6e8 0%, #ffd6e8 18%, transparent 19%),
        radial-gradient(ellipse at 85% 15%, #ffc2dd 0%, #ffc2dd 14%, transparent 15%),
        radial-gradient(ellipse at 25% 85%, #ffe3f0 0%, #ffe3f0 20%, transparent 21%),
        radial-gradient(ellipse at 80% 80%, #ffb6d5 0%, #ffb6d5 16%, transparent 17%),
        linear-gradient(135deg, #ffe6f2, #ffd1e6);
      color: #3b1024;
    }

    .card {
      width: min(90vw, 420px);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 20px 45px rgba(150, 20, 80, 0.22);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.55);
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 2.2rem;
    }

    #scanner {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto 22px;
      border-radius: 26px;
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 30%, #fff4fa, #ffd3e7 60%),
        #ffd3e7;
      border: 3px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 0 30px rgba(255, 80, 140, 0.25),
                  0 12px 28px rgba(130, 20, 75, 0.22);
    }

    #scanner::before {
      content: "👁️";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      opacity: 0.75;
    }

    .laser {
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 35%,
        rgba(255, 0, 0, 0.15) 43%,
        rgba(255, 0, 0, 0.8) 50%,
        rgba(255, 0, 0, 0.15) 57%,
        transparent 65%
      );
      box-shadow: 0 0 25px red;
      animation-name: scanning;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    @keyframes scanning {
      from {
        transform: translateX(-100%);
      }
      to {
        transform: translateX(220%);
      }
    }

    .button-box {
      display: inline-block;
      padding: 10px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 20%, #fff0f5, transparent 35%),
        linear-gradient(135deg, #ffc3d9, #ff8fb8);
      box-shadow: 0 10px 25px rgba(190, 20, 70, 0.25);
    }

    #detect-btn {
      padding: 14px 30px;
      font-size: 1rem;
      font-weight: bold;
      background: linear-gradient(135deg, #ff1e3c, #b80024);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 6px 0 #7d0018;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #detect-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #7d0018;
    }

    #detect-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #7d0018;
    }

    #detect-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #result {
      margin-top: 22px;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 1.8em;
    }

    .loading {
      animation: pulse 0.7s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.45; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Fun Detector</h1>

    <div id="scanner"></div>

    <div class="button-box">
      <button id="detect-btn">Detectar</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const responses = [
      "respuesta 1",
      "respuesta 2",
      "respuesta 3",
      "respuesta 4",
      "respuesta 5"
    ];

    const scanner = document.getElementById("scanner");
    const button = document.getElementById("detect-btn");
    const result = document.getElementById("result");

    function startScan() {
      button.disabled = true;
      result.textContent = "Escaneando...";
      result.classList.add("loading");

      const oldLaser = scanner.querySelector(".laser");
      if (oldLaser) oldLaser.remove();

      const duration = Math.floor(Math.random() * 6) + 5;
      const laser = document.createElement("div");

      laser.className = "laser";
      laser.style.animationDuration = duration + "s";

      scanner.appendChild(laser);

      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * responses.length);

        result.classList.remove("loading");
        result.textContent = responses[randomIndex];

        button.disabled = false;
      }, duration * 1000);
    }

    button.addEventListener("click", startScan);
  </script>
</body>
</html>
